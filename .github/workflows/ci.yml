name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ChatCore.NET/ChatCore.NET.slnx

      - name: Build
        run: |
          dotnet build ChatCore.NET/ChatCore.NET.slnx \
            --no-restore \
            --configuration Release

      - name: Unit tests
        run: |
          dotnet test ChatCore.NET/tests/ChatCore.Tests.Unit/ChatCore.Tests.Unit.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory ./test-results

      - name: Integration tests
        run: |
          dotnet test ChatCore.NET/tests/ChatCore.Tests.Integration/ChatCore.Tests.Integration.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/*.trx
