name: Publish to NuGet

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  publish:
    name: Pack & Push
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ChatCore.NET/ChatCore.NET.slnx

      - name: Build
        run: |
          dotnet build ChatCore.NET/ChatCore.NET.slnx \
            --no-restore \
            --configuration Release \
            /p:Version=${{ steps.version.outputs.VERSION }} \
            /p:CI=true

      - name: Test
        run: |
          dotnet test ChatCore.NET/ChatCore.NET.slnx \
            --no-build \
            --configuration Release \
            /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack all packages
        run: |
          for proj in \
            ChatCore.NET/src/ChatCore.Abstractions/ChatCore.Abstractions.csproj \
            ChatCore.NET/src/ChatCore.Core/ChatCore.Core.csproj \
            ChatCore.NET/src/ChatCore.Persistence.EFCore/ChatCore.Persistence.EFCore.csproj \
            ChatCore.NET/src/ChatCore.RealTime.SignalR/ChatCore.RealTime.SignalR.csproj \
            ChatCore.NET/src/ChatCore.AspNetCore/ChatCore.AspNetCore.csproj; do
            dotnet pack "$proj" \
              --no-build \
              --configuration Release \
              /p:Version=${{ steps.version.outputs.VERSION }} \
              --output ./nupkgs
          done

      # Trusted Publishing: exchange the GitHub OIDC token for a NuGet API token
      - name: Get NuGet API token via Trusted Publishing
        id: nuget-token
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")

          NUGET_TOKEN=$(curl -s -X POST "https://www.nuget.org/api/v1/trusted-publisher/github-actions/token" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"$OIDC_TOKEN\"}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          echo "::add-mask::$NUGET_TOKEN"
          echo "NUGET_TOKEN=$NUGET_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Push packages to NuGet.org
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-token.outputs.NUGET_TOKEN }} \
            --skip-duplicate

      - name: Push symbol packages
        run: |
          dotnet nuget push "./nupkgs/*.snupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-token.outputs.NUGET_TOKEN }} \
            --skip-duplicate

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: ./nupkgs/
